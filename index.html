<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Éclats">
<meta name="theme-color" content="#1a1a1a">
<title>Nouveaux Éclats — Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --ink: #1B3E84; --paper: #FDFCF7; }
html, body {
  background: #1a1a1a; min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: #d4d4d4; overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
body { padding-top: env(safe-area-inset-top); }
.studio { display: flex; flex-direction: column; min-height: 100vh; }
.preview-zone {
  background: #0e0e0e; padding: 10px 12px 10px;
  display: flex; flex-direction: column; align-items: center;
  border-bottom: 1px solid #2a2a2a;
  position: sticky;
  top: 0;
  z-index: 20;
}
.preview-label {
  color: #555; font-family: 'Cormorant Garamond', serif;
  font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; margin-bottom: 6px;
}
.preview-frame {
  width: 150px; height: 267px;
  position: relative; overflow: hidden;
  border-radius: 4px; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
.preview-frame .ne-reel {
  width: 360px; height: 640px;
  border-radius: 0; box-shadow: none;
  transform: scale(0.4167); transform-origin: top left;
}
.controls { padding: 16px; padding-bottom: 110px; }
.controls h1 {
  font-family: 'Cormorant Garamond', serif; font-weight: 300;
  font-size: 18px; letter-spacing: 0.2em; text-transform: uppercase;
  color: #e8e8e8; margin-bottom: 2px; text-align: center;
}
.controls .subtitle {
  color: #888; font-size: 11px; letter-spacing: 0.06em;
  font-style: italic; margin-bottom: 18px; text-align: center;
}
.section { margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid #2a2a2a; }
.section:last-child { border-bottom: none; }
.section-label {
  color: #888; font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 10px;
}
.preset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.preset-btn {
  background: #2c2c2c; border: 1px solid #383838; color: #c0c0c0;
  padding: 12px 8px; font-family: 'Cormorant Garamond', serif;
  font-size: 14px; letter-spacing: 0.08em; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  gap: 8px; min-height: 44px;
}
.preset-btn .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.preset-btn.active { background: #404040; border-color: #6a6a6a; color: #fff; }
.slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.slider-row input[type=range] {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 6px; background: #3a3a3a; border-radius: 3px; outline: none;
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 24px; height: 24px; border-radius: 50%; background: #d4d4d4;
}
.slider-value { min-width: 38px; text-align: right; font-family: 'SF Mono', Menlo, monospace; font-size: 13px; color: #c0c0c0; }
.slider-info { font-size: 10px; color: #777; font-style: italic; margin-top: 4px; display: flex; justify-content: space-between; }
textarea {
  width: 100%; background: #2c2c2c; border: 1px solid #383838; color: #e8e8e8;
  padding: 12px; border-radius: 4px;
  font-family: 'Spectral', serif; font-size: 16px; line-height: 1.6;
  resize: none; min-height: 130px; outline: none; -webkit-appearance: none;
}
textarea:focus { border-color: #6a6a6a; }
.help { font-size: 11px; color: #777; margin-top: 8px; font-style: italic; line-height: 1.5; }
.radio-group { display: flex; flex-direction: column; gap: 4px; }
.radio-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 4px;
  background: #2c2c2c; border: 1px solid transparent; min-height: 44px;
}
.radio-row.checked { background: #353535; border-color: #5a5a5a; }
.radio-row input { width: 18px; height: 18px; accent-color: #d4d4d4; flex-shrink: 0; }
.radio-row label { font-size: 14px; color: #c0c0c0; flex: 1; }
.radio-row label .small { color: #888; font-size: 12px; font-style: italic; }
.record-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #1a1a1a; border-top: 1px solid #333;
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  z-index: 50;
}
.btn-record {
  width: 100%; background: #1B3E84; color: #fff; border: none;
  padding: 16px; font-family: 'Cormorant Garamond', serif;
  font-size: 15px; letter-spacing: 0.18em; text-transform: uppercase;
  border-radius: 4px; min-height: 50px;
}
.btn-record:active { background: #254ea3; }
.ne-reel {
  width: 360px; height: 640px; background: var(--paper);
  border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  position: relative; overflow: hidden; color: var(--ink);
}
.ne-corner { position: absolute; pointer-events: none; z-index: 1; }
.ne-corner svg { width: 100%; height: 100%; display: block; }
.ne-corner.tl { top: 14px; left: 14px; width: 80px; height: 80px; }
.ne-corner.tr { top: 14px; right: 14px; width: 80px; height: 80px; transform: scaleX(-1); }
.ne-corner.bl { bottom: 14px; left: 14px; width: 115px; height: 115px; }
.ne-corner.br { bottom: 14px; right: 14px; width: 115px; height: 115px; }
.ne-stack {
  position: absolute; inset: 0; padding: 0 8px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  gap: 14px; z-index: 2;
}
/* Tous les logos empilés, cachés par défaut */
.logo-variant {
  width: 320px; height: auto; overflow: visible;
  position: absolute;
  visibility: hidden;
  pointer-events: none;
}
.logo-variant.active {
  visibility: visible;
  position: relative;
  pointer-events: auto;
}
/* Logo de preview */
.ne-logo { width: 320px; height: auto; display: block; overflow: visible; }
.ne-poem {
  text-align: left; color: var(--ink);
  font-family: 'Spectral', serif; font-weight: 400;
  font-size: 19px; line-height: 1.65; padding: 0 12px;
}
.ne-poem p { margin-bottom: 12px; }
.ne-poem p:last-child { margin-bottom: 0; }
.ne-poem .em { font-style: italic; font-weight: 300; }
.ne-poem .indent { padding-left: 2em; display: block; }
.ne-footer { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.ne-trait { width: 320px; height: auto; display: block; }
.ne-signature {
  color: var(--ink); opacity: 0.7;
  font-family: 'Spectral', serif; font-style: italic;
  font-size: 11px; letter-spacing: 0.15em;
}
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
body.recording { background: #000; overflow: hidden; padding: 0; }
body.recording .preview-zone,
body.recording .controls,
body.recording .record-bar { display: none !important; }
/* Le poème part invisible — géré par JS dans triggerApparition */
#recording-stage {
  display: none; position: fixed; inset: 0; background: #000;
  z-index: 999; align-items: center; justify-content: center;
}
body.recording #recording-stage { display: flex; }
#recording-stage .ne-reel {
  width: min(100vw, calc(100dvh * 9 / 16));
  height: min(calc(100vw * 16 / 9), 100dvh);
  border-radius: 0; box-shadow: none; --scale: 1;
}
@media (max-aspect-ratio: 9/16) {
  #recording-stage .ne-reel {
    width: 100vw; height: calc(100vw * 16 / 9);
    --scale: calc(100vw / 360);
  }
}
#recording-stage .ne-corner.tl, #recording-stage .ne-corner.tr {
  top: calc(14px * var(--scale)); width: calc(80px * var(--scale)); height: calc(80px * var(--scale));
}
#recording-stage .ne-corner.tl { left: calc(14px * var(--scale)); }
#recording-stage .ne-corner.tr { right: calc(14px * var(--scale)); }
#recording-stage .ne-corner.bl, #recording-stage .ne-corner.br {
  bottom: calc(14px * var(--scale)); width: calc(115px * var(--scale)); height: calc(115px * var(--scale));
}
#recording-stage .ne-corner.bl { left: calc(14px * var(--scale)); }
#recording-stage .ne-corner.br { right: calc(14px * var(--scale)); }
#recording-stage .ne-stack { padding: 0 calc(8px * var(--scale)); gap: calc(14px * var(--scale)); }
#recording-stage .logo-variant.active,
#recording-stage .ne-trait { width: calc(320px * var(--scale)); }
#recording-stage .ne-poem { font-size: calc(19px * var(--scale)); padding: 0 calc(12px * var(--scale)); }
#recording-stage .ne-poem p { margin-bottom: calc(12px * var(--scale)); }
#recording-stage .ne-signature { font-size: calc(11px * var(--scale)); }
.countdown-overlay {
  position: fixed; inset: 0; background: #000; display: none;
  align-items: center; justify-content: center;
  z-index: 1000; flex-direction: column; gap: 30px;
}
body.counting .countdown-overlay { display: flex; }
body.counting .preview-zone, body.counting .controls, body.counting .record-bar { display: none; }
.countdown-num {
  color: #fff; font-family: 'Cormorant Garamond', serif;
  font-size: 140px; font-weight: 300; line-height: 1;
}
.countdown-help {
  color: #888; font-size: 14px; font-family: 'Cormorant Garamond', serif;
  font-style: italic; letter-spacing: 0.05em; text-align: center; padding: 0 30px;
}

<div class="countdown-overlay">
  <div class="countdown-num" id="countdown-num">3</div>
  <div class="countdown-help">Lance la capture d'écran vidéo maintenant</div>
</div>

<script>
const PRESETS = {"Nuit": {"paper": "#FDFCF7", "mood": "Mélancolie, distance, contemplation", "reference_ink": "#1B3E84", "axis": "saturation", "steps": {"0": "#3F4A60", "10": "#384867", "20": "#30456F", "30": "#294376", "40": "#22407D", "50": "#1B3E84", "60": "#143C8B", "70": "#0D3992", "80": "#063799", "90": "#00359F", "100": "#00359F"}, "animation": "respiration", "animation_duration": 4}, "Souvenir": {"paper": "#F0E8D8", "mood": "Nostalgie, automne, tendresse passée", "reference_ink": "#5C3A21", "axis": "saturation", "steps": {"0": "#403E3D", "10": "#463D38", "20": "#4B3D32", "30": "#513C2C", "40": "#563B27", "50": "#5C3A21", "60": "#62391B", "70": "#673816", "80": "#6D3710", "90": "#72370B", "100": "#783605"}, "animation": "respiration-lente", "animation_duration": 6}, "Brûlure": {"paper": "#F5E8E4", "mood": "Amour, désir contenu, chaleur retenue", "reference_ink": "#6B2737", "axis": "saturation", "steps": {"0": "#4A4848", "10": "#514145", "20": "#573B41", "30": "#5E343E", "40": "#642E3A", "50": "#6B2737", "60": "#722034", "70": "#781A30", "80": "#7F132D", "90": "#850D29", "100": "#8C0626"}, "animation": "oscillation-florale", "animation_duration": 5}, "Refuge": {"paper": "#F2EFE3", "mood": "Nature, silence, ancrage", "reference_ink": "#2D4A3E", "axis": "saturation", "steps": {"0": "#3C3C3C", "10": "#3C3C3C", "20": "#3C3C3C", "30": "#383F3C", "40": "#32453D", "50": "#2D4A3E", "60": "#284F3F", "70": "#225540", "80": "#1D5A41", "90": "#185F42", "100": "#126543"}, "animation": "respiration", "animation_duration": 4}, "Aurore": {"paper": "#F5EDD8", "mood": "Lumière tempérée, espoir, matin", "reference_ink": "#8B5A2B", "axis": "saturation", "steps": {"0": "#625B54", "10": "#6A5B4C", "20": "#725B44", "30": "#7B5A3B", "40": "#835A33", "50": "#8B5A2B", "60": "#935A23", "70": "#9B5A1B", "80": "#A45912", "90": "#AC590A", "100": "#B45902"}, "animation": "lueur-pulsée", "animation_duration": 4}, "Pluie": {"paper": "#F4F1EA", "mood": "Doute, attente, gravité douce", "reference_ink": "#3D4A5C", "axis": "saturation", "steps": {"0": "#4C4C4C", "10": "#4C4C4C", "20": "#4C4C4C", "30": "#4B4C4E", "40": "#444B55", "50": "#3D4A5C", "60": "#364963", "70": "#2F486A", "80": "#284771", "90": "#214678", "100": "#1B447E"}, "animation": "respiration-lente", "animation_duration": 6}, "Gravité": {"paper": "#F8F5EE", "mood": "Deuil, vérité nue, silence absolu", "reference_ink": "#1A1A1A", "axis": "luminosité", "steps": {"0": "#000000", "10": "#060606", "20": "#0B0B0B", "30": "#101010", "40": "#151515", "50": "#1A1A1A", "60": "#1F1F1F", "70": "#242424", "80": "#292929", "90": "#2E2E2E", "100": "#343434"}, "animation": "respiration-très-lente", "animation_duration": 7}};
const DEFAULT_POEM = "Le silence du soir\ntombe comme une **cendre**\n\nsur les l\u00e8vres muettes\nde l'**absence**.";
const PRESET_NAMES = ['Nuit', 'Souvenir', 'Brûlure', 'Refuge', 'Aurore', 'Pluie', 'Gravité'];

let currentInk = 'Nuit';
let currentInkSlider = 50;
let currentPaper = 'Nuit';
let currentAnim = 'w4';
let currentApparition = 'instant';

function makeColorGrid(gridId, current, onSelect) {
  const grid = document.getElementById(gridId);
  PRESET_NAMES.forEach(name => {
    const preset = PRESETS[name];
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (name === current ? ' active' : '');
    btn.innerHTML = '<span class="dot" style="background:' + preset.reference_ink + '"></span> ' + name;
    btn.addEventListener('click', () => {
      grid.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onSelect(name);
    });
    grid.appendChild(btn);
  });
}

makeColorGrid('ink-grid', currentInk, (name) => {
  currentInk = name;
  updatePreview();
});

// Grille papier avec noms descriptifs + gris pierre
(function() {
  const PAPER_LABELS = {
    'Nuit': 'Ivoire', 'Souvenir': 'Sépia', 'Brûlure': 'Rose pâle',
    'Refuge': 'Lin', 'Aurore': 'Sable', 'Pluie': 'Gris chaud',
    'Gravité': 'Blanc cassé', 'Pierre': 'Gris pierre',
  };
  const PAPER_COLORS = {
    'Nuit': '#FDFCF7', 'Souvenir': '#F0E8D8', 'Brûlure': '#F5E8E4',
    'Refuge': '#F2EFE3', 'Aurore': '#F5EDD8', 'Pluie': '#F4F1EA',
    'Gravité': '#F8F5EE', 'Pierre': '#D4D4D0',
  };
  // Stocker pour updatePreview
  window.PAPER_COLORS = PAPER_COLORS;

  const grid = document.getElementById('paper-grid');
  const allPapers = [...PRESET_NAMES, 'Pierre'];
  allPapers.forEach(name => {
    const color = PAPER_COLORS[name];
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (name === currentPaper ? ' active' : '');
    btn.innerHTML = '<span class="dot" style="background:' + color + '; border:1px solid #ccc;"></span> ' + PAPER_LABELS[name];
    btn.addEventListener('click', () => {
      grid.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPaper = name;
      updatePreview();
    });
    grid.appendChild(btn);
  });
})();

const inkSlider = document.getElementById('ink-slider');
const inkSliderValue = document.getElementById('ink-slider-value');
inkSlider.addEventListener('input', (e) => {
  currentInkSlider = parseInt(e.target.value);
  inkSliderValue.textContent = currentInkSlider;
  updatePreview();
});



// Radios animation
document.querySelectorAll('input[name="anim"]').forEach(r => {
  r.addEventListener('change', (e) => {
    currentAnim = e.target.value;
    document.querySelectorAll('#anim-group .radio-row').forEach(row => row.classList.remove('checked'));
    e.target.closest('.radio-row').classList.add('checked');
  });
});

// Radios apparition
document.querySelectorAll('input[name="apparition"]').forEach(r => {
  r.addEventListener('change', (e) => {
    currentApparition = e.target.value;
    document.querySelectorAll('#app-group .radio-row').forEach(row => row.classList.remove('checked'));
    e.target.closest('.radio-row').classList.add('checked');
  });
});

const poemText = document.getElementById('poem-text');
poemText.addEventListener('input', updatePreview);
poemText.value = DEFAULT_POEM;

function updatePreview() {
  const ink   = PRESETS[currentInk].steps[String(currentInkSlider)];
  // Pour le papier : on utilise les steps aussi (axe saturation sur la couleur de papier)
  // Le papier est fixe dans les presets, donc on va interpoler entre blanc pur et la couleur papier
  // Plus simple : on utilise directement le papier du préréglage (il ne change pas avec le slider)
  // Le curseur papier ajuste l'intensité via les steps de l'encre du preset papier choisi
  // → on l'utilise comme teinte de papier en prenant steps du preset papier inversé
  // En fait le plus simple : le curseur papier sélectionne parmi des papiers pré-calculés.
  // Les "steps" des presets sont calculés pour l'encre. Pour le papier, on interpole
  // entre blanc (#FFFFFF) et la couleur papier du preset selon le slider.
  const paperColors = window.PAPER_COLORS || {};
  const paper = paperColors[currentPaper] || (PRESETS[currentPaper] ? PRESETS[currentPaper].paper : '#FFFFFF');
  document.documentElement.style.setProperty('--ink', ink);
  document.documentElement.style.setProperty('--paper', paper);
  renderPoem();
}



function renderPoem() {
  const html = buildPoemHtml(false);
  document.querySelectorAll('.ne-poem').forEach(el => { el.innerHTML = html; });
}

function buildPoemHtml(lineByLine) {
  const lines = poemText.value.split('\n');
  const fmt = (l) => {
    const indented = l.startsWith('#');
    const text = indented ? l.slice(1) : l;
    const formatted = text.replace(/\*\*([^*]+)\*\*/g, '<span class="em">$1</span>');
    return indented ? '<span class="indent">' + formatted + '</span>' : formatted;
  };
  let html = '', strophe = [];
  const flush = () => {
    if (!strophe.length) return;
    if (lineByLine) {
      html += '<p>' + strophe.map(l => '<span class="line" style="display:block">' + fmt(l) + '</span>').join('') + '</p>';
    } else {
      html += '<p>' + strophe.map(fmt).join('<br>') + '</p>';
    }
    strophe = [];
  };
  lines.forEach(l => { if (l.trim() === '') flush(); else strophe.push(l); });
  flush();
  return html;
}

function updateRecordingScale() {
  const reel = document.querySelector('#recording-stage .ne-reel');
  if (!reel) return;
  const scale = reel.getBoundingClientRect().height / 640;
  reel.style.setProperty('--scale', scale);
}

function showLogo(animKey) {
  // Afficher uniquement le logo correspondant à l'animation choisie
  document.querySelectorAll('#recording-stage .logo-variant').forEach(el => {
    el.classList.toggle('active', el.dataset.anim === animKey);
  });
}

document.getElementById('btn-record').addEventListener('click', () => {
  // Tenter le plein écran (masque les barres de navigation sur Edge iOS)
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();

  // Rendre le poème invisible immédiatement, avant même le compte à rebours
  const poem = document.querySelector('#recording-stage .ne-poem');
  if (poem) { poem.style.transition = 'none'; poem.style.opacity = '0'; }
  document.body.classList.add('counting');
  let count = 3;
  document.getElementById('countdown-num').textContent = count;
  const iv = setInterval(() => {
    count--;
    if (count > 0) {
      document.getElementById('countdown-num').textContent = count;
    } else {
      clearInterval(iv);
      document.body.classList.remove('counting');
      // Afficher le bon logo AVANT de passer en recording
      // (les éléments sont déjà dans le DOM, on change juste display)
      showLogo(currentAnim);
      document.body.classList.add('recording');
      requestAnimationFrame(() => {
        updateRecordingScale();
        setTimeout(triggerApparition, 80);
      });
    }
  }, 1000);
});

function triggerApparition() {
  const poem = document.querySelector('#recording-stage .ne-poem');
  if (!poem) return;

  // Tous les timings rayon par rayon (G→C→D, toutes vagues)
  // Un vers tous les 2 rayons : indices 0, 2, 4, 6...
  const VERSE_TIMINGS = {
    'static': [0, 0, 0, 0, 0, 0],
    'w3':     [1.0,  3.0,  6.0,  9.0,  11.0, 11.0],
    'w4':     [1.0,  2.529, 4.824, 7.118, 8.647, 10.941],
    'w5':     [1.0,  2.238, 4.095, 5.952, 7.19,  9.048],
  };

  const firstRay = currentAnim === 'static' ? 0 : 1.0;
  const verseDelays = VERSE_TIMINGS[currentAnim] || VERSE_TIMINGS['w4'];
  const RISE = 0.8;
  // Fade out du texte sur les 2 dernières secondes (13s → 15s)
  setTimeout(() => {
    poem.style.transition = 'opacity 2s ease-in-out';
    poem.style.opacity = '0';
  }, 13000);

  // Écran noir instantané à 15s pile
  setTimeout(() => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:#000;opacity:1;z-index:9999;';
    document.body.appendChild(overlay);
  }, 15000);

  if (currentApparition === 'instant' || currentApparition === 'fade') {
    const delay = currentAnim === 'static' ? 0 : firstRay;
    poem.style.transition = 'none';
    poem.style.opacity = '0';
    void poem.offsetWidth;
    setTimeout(() => {
      poem.style.transition = 'opacity ' + RISE + 's ease-in-out';
      poem.style.opacity = '1';
    }, delay * 1000);

  } else if (currentApparition === 'line') {
    poem.innerHTML = buildPoemHtml(true);
    poem.style.opacity = '1';
    poem.querySelectorAll('.line').forEach((el, i) => {
      const delay = verseDelays[i] !== undefined ? verseDelays[i] : verseDelays[verseDelays.length - 1];
      el.style.transition = 'none';
      el.style.opacity = '0';
      void el.offsetWidth;
      setTimeout(() => {
        el.style.transition = 'opacity ' + RISE + 's ease-in-out';
        el.style.opacity = '1';
      }, delay * 1000);
    });
  }
}

window.addEventListener('resize', () => {
  if (document.body.classList.contains('recording')) updateRecordingScale();
});

// Swipe vers le bas pour quitter le mode recording
(function() {
  let touchStartY = 0;
  let touchStartX = 0;

  document.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!document.body.classList.contains('recording')) return;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
    // Swipe vers le bas d'au moins 80px, plus vertical qu'horizontal
    if (dy > 80 && dx < dy * 0.6) {
      exitRecording();
    }
  }, { passive: true });
})();

function exitRecording() {
  // Quitter le plein écran
  if (document.exitFullscreen) document.exitFullscreen();
  else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  // Supprimer l'overlay noir s'il existe
  document.querySelectorAll('div[style*="z-index:9999"]').forEach(el => el.remove());
  document.body.classList.remove('recording');
  const poem = document.querySelector('#recording-stage .ne-poem');
  if (poem) { poem.style.transition = 'none'; poem.style.opacity = '0'; }
}

// Initialiser avec le logo static visible
showLogo('static');
updatePreview();
</script>
